<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Margin — vocabulary from your books</title>

  <!-- PWA wiring: the manifest makes the app installable, theme-color paints the title bar -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#8A3033" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Type: Fraunces (characterful serif, used for the word specimen) + Inter (clean UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper:   #FBF9F4;  /* warm page */
      --paper-2: #F3EFE6;  /* card / inset */
      --surface: #FFFFFF;  /* input / card background, sits above the page */
      --ink:     #23201B;  /* near-black text */
      --ink-soft:#6B6459;  /* muted labels */
      --oxblood: #8A3033;  /* accent — fountain-pen wine */
      --oxblood-soft: #f0e2e2;
      --on-oxblood: #FBF9F4;  /* text/icons on an oxblood background — stays light in both themes */
      --oxblood-hover: #75282b;
      --good: #4A7A4F;       /* quiz: correct answer */
      --good-soft: #E6EDE3;
      --line:    #E3DDD0;  /* hairlines */
      --radius: 14px;
    }

    /* System preference — applies only until the user picks a theme manually
       (the toggle sets data-theme, which the rules below take priority over). */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --paper:   #1E1B17;
        --paper-2: #2A2521;
        --surface: #262119;
        --ink:     #F0EAE0;
        --ink-soft:#A79E8E;
        --oxblood: #C1585B;
        --oxblood-soft: #3A2224;
        --oxblood-hover: #A6474A;
        --good: #7CAA7E;
        --good-soft: #26332A;
        --line:    #3A342C;
      }
    }

    :root[data-theme="dark"] {
      --paper:   #1E1B17;
      --paper-2: #2A2521;
      --surface: #262119;
      --ink:     #F0EAE0;
      --ink-soft:#A79E8E;
      --oxblood: #C1585B;
      --oxblood-soft: #3A2224;
      --oxblood-hover: #A6474A;
      --good: #7CAA7E;
      --good-soft: #26332A;
      --line:    #3A342C;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--paper);
      color: var(--ink);
      font-family: "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: max(20px, env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom));
    }

    .wrap { max-width: 620px; margin: 0 auto; }

    /* ---- Masthead ---- */
    header { position: relative; padding: 8px 0 22px; border-bottom: 1px solid var(--line); }
    .brand {
      font-family: "Fraunces", serif;
      font-weight: 600;
      font-size: 30px;
      letter-spacing: -0.01em;
      margin: 0;
      padding-right: 44px; /* keep the title clear of the theme toggle */
    }
    .brand .dot { color: var(--oxblood); }
    .tagline { margin: 4px 0 0; color: var(--ink-soft); font-size: 14px; }

    .btn-theme {
      position: absolute; top: 4px; right: 0;
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; padding: 0;
      background: transparent; color: var(--ink-soft);
      border: 1.5px solid var(--line); border-radius: 999px;
    }
    .btn-theme:hover { background: transparent; color: var(--oxblood); border-color: var(--oxblood); }

    .btn-install {
      margin-top: 14px;
      background: transparent; color: var(--oxblood);
      border: 1.5px solid var(--oxblood);
      padding: 8px 16px; font-size: 13px;
    }
    .btn-install:hover { background: var(--oxblood-soft); }

    /* ---- Book tag (bookplate) ---- */
    .book-row { display: flex; align-items: center; gap: 10px; margin: 20px 0 14px; }
    .book-row[hidden] { display: none; }
    .book-row label {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--ink-soft); white-space: nowrap;
    }
    .book-row input {
      flex: 1; min-width: 0;
      background: transparent;
      border: none; border-bottom: 1.5px dashed var(--line);
      padding: 6px 2px; font: inherit; color: var(--ink);
    }
    .book-row input:focus { outline: none; border-bottom-color: var(--oxblood); }

    /* ---- Lookup bar ---- */
    .lookup { display: flex; gap: 10px; }
    .lookup[hidden] { display: none; }
    .word-field { position: relative; flex: 1; min-width: 0; }
    .word-field input {
      width: 100%;
      font-family: "Fraunces", serif; font-size: 22px;
      background: var(--surface);
      border: 1px solid var(--line); border-radius: var(--radius);
      padding: 14px 40px 14px 16px; color: var(--ink);
    }
    .word-field input::placeholder { color: #B7AE9E; font-style: italic; }
    .word-field input:focus { outline: 2px solid var(--oxblood); outline-offset: 1px; border-color: transparent; }

    .btn-clear {
      position: absolute; top: 50%; right: 6px; transform: translateY(-50%);
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; padding: 0;
      background: transparent; color: var(--ink-soft);
      border: none; border-radius: 8px;
    }
    .btn-clear:hover { background: var(--paper-2); color: var(--oxblood); }
    .btn-clear[hidden] { display: none; }

    button {
      font: inherit; font-weight: 600; cursor: pointer;
      border: none; border-radius: var(--radius);
      background: var(--oxblood); color: var(--on-oxblood);
      padding: 0 20px;
    }
    button:hover { background: var(--oxblood-hover); }
    button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
    button:disabled { opacity: .5; cursor: default; }

    .btn-mic {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center;
      background: transparent; color: var(--ink-soft);
      border: 1.5px solid var(--line);
      padding: 0 14px;
    }
    .btn-mic:hover { background: transparent; color: var(--oxblood); border-color: var(--oxblood); }
    .btn-mic.listening {
      color: var(--oxblood); border-color: var(--oxblood); background: var(--oxblood-soft);
      animation: pulse 1.1s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    @media (prefers-reduced-motion: reduce) { .btn-mic.listening { animation: none; } }

    /* ---- States ---- */
    .status { margin: 26px 2px; color: var(--ink-soft); font-size: 15px; }
    .status.error { color: var(--oxblood); }

    /* ---- Word specimen card ---- */
    .card {
      margin-top: 26px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px 24px 26px;
      position: relative;
      animation: rise .28s ease both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { .card { animation: none; } }

    .card::before {
      content: ""; position: absolute; left: 24px; top: 0;
      width: 44px; height: 3px; background: var(--oxblood);
      border-radius: 0 0 3px 3px;
    }
    .headword {
      font-family: "Fraunces", serif; font-weight: 600;
      font-size: 34px; line-height: 1.1; margin: 6px 0 2px;
    }
    .pos { font-family: "Fraunces", serif; font-style: italic; color: var(--oxblood); font-size: 17px; }
    .phon { color: var(--ink-soft); font-size: 14px; margin-left: 8px; }
    .btn-audio {
      background: none; border: none; color: var(--ink-soft);
      padding: 2px; margin-left: 4px; vertical-align: -3px;
      display: inline-flex; border-radius: 6px;
    }
    .btn-audio:hover { color: var(--oxblood); background: var(--oxblood-soft); }
    .def { font-size: 17px; line-height: 1.55; margin: 16px 0 0; }
    .example {
      margin: 14px 0 0; padding-left: 14px;
      border-left: 2px solid var(--oxblood-soft);
      color: var(--ink-soft); font-style: italic; font-size: 15px;
    }

    .chips-label {
      font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--ink-soft); margin: 20px 0 8px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: var(--paper-2); border: 1px solid var(--line);
      border-radius: 999px; padding: 5px 12px; font-size: 14px;
    }
    .chip.ant { background: var(--oxblood-soft); border-color: #e3cccc; }

    .save-row { margin-top: 22px; display: flex; justify-content: flex-end; gap: 10px; }
    .btn-save {
      background: transparent; color: var(--oxblood);
      border: 1.5px solid var(--oxblood);
      padding: 10px 18px;
    }
    .btn-save:hover { background: var(--oxblood-soft); }
    .btn-save.saved { border-color: var(--line); color: var(--ink-soft); }

    .btn-ai {
      background: transparent; color: var(--ink-soft);
      border: 1.5px solid var(--line);
      padding: 10px 18px;
    }
    .btn-ai:hover { background: transparent; color: var(--oxblood); border-color: var(--oxblood); }

    .ai-badge {
      font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--ink-soft); border: 1px solid var(--line); border-radius: 999px;
      padding: 2px 8px; margin-left: 8px; vertical-align: 2px;
    }

    .foot { margin-top: 30px; color: var(--ink-soft); font-size: 13px; text-align: center; }
    .foot code { background: var(--paper-2); padding: 1px 6px; border-radius: 5px; }

    /* ---- Saved list ---- */
    .saved-section { margin-top: 44px; padding-top: 26px; border-top: 1px solid var(--line); }
    .saved-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .saved-title { font-family: "Fraunces", serif; font-weight: 600; font-size: 20px; margin: 0; }
    .saved-header-actions { display: flex; align-items: center; gap: 8px; }
    .book-filter {
      font: inherit; font-size: 13px; color: var(--ink-soft);
      background: var(--paper-2); border: 1px solid var(--line);
      border-radius: 8px; padding: 6px 10px;
    }
    .btn-practice {
      font-size: 13px;
      background: transparent; color: var(--oxblood);
      border: 1.5px solid var(--oxblood);
      padding: 7px 14px;
    }
    .btn-practice:hover { background: var(--oxblood-soft); }
    .btn-practice[hidden] { display: none; } /* no saved words at all yet */
    .saved-empty { color: var(--ink-soft); font-size: 14px; }
    .saved-entry { border-bottom: 1px solid var(--line); }
    .saved-entry:last-child { border-bottom: none; }
    .saved-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .saved-row {
      flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px;
      background: none; border: none; text-align: left; font: inherit; color: inherit;
      padding: 14px 2px; border-radius: 8px;
    }
    .saved-row:hover { background: var(--paper-2); }
    .saved-word-line { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .saved-word { font-family: "Fraunces", serif; font-weight: 600; font-size: 17px; }
    .saved-meta { color: var(--ink-soft); font-size: 13px; }
    .saved-caret { color: var(--ink-soft); font-size: 12px; }
    .saved-delete {
      background: transparent; color: var(--ink-soft); font-weight: 500; font-size: 13px;
      border: none; padding: 6px 10px; border-radius: 8px; flex: 0 0 auto;
    }
    .saved-delete:hover { color: var(--oxblood); background: var(--oxblood-soft); }
    .saved-detail { padding: 0 2px 18px; }
    .saved-detail .pos { font-size: 15px; }
    .saved-detail .def { font-size: 15px; margin-top: 8px; }
    .saved-detail .example { font-size: 14px; }
    .saved-detail .chips-label { margin: 14px 0 6px; }

    /* ---- Practice (flashcards + quiz) ---- */
    .practice-section { margin-top: 44px; padding-top: 26px; border-top: 1px solid var(--line); }
    .practice-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .practice-progress { color: var(--ink-soft); font-size: 13px; margin: 0; font-variant-numeric: tabular-nums; }
    .btn-practice-close {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; padding: 0;
      background: transparent; color: var(--ink-soft);
      border: 1.5px solid var(--line); border-radius: 999px;
    }
    .btn-practice-close:hover { background: transparent; color: var(--oxblood); border-color: var(--oxblood); }

    .practice-lede { color: var(--ink-soft); font-size: 14px; margin: 0 0 18px; }
    .practice-hint { color: var(--ink-soft); font-size: 13px; font-style: italic; margin: 12px 0 0; }
    .practice-mode-buttons { display: flex; gap: 10px; }
    .practice-mode-buttons button { flex: 1; padding: 16px 12px; }

    .flashcard { cursor: pointer; min-height: 130px; }
    .flashcard-hint { margin: 20px 0 0; color: var(--ink-soft); font-style: italic; font-size: 14px; }

    .quiz-prompt { color: var(--ink-soft); font-size: 14px; margin: 20px 0 10px; }
    .quiz-choices { display: flex; flex-direction: column; gap: 8px; }
    .quiz-choice {
      display: block; width: 100%; text-align: left;
      background: var(--paper-2); color: var(--ink);
      font-weight: 500;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .quiz-choice:hover:not(:disabled) { background: var(--paper-2); border-color: var(--oxblood); }
    .quiz-choice.correct { background: var(--good-soft); border-color: var(--good); color: var(--good); }
    .quiz-choice.incorrect { background: var(--oxblood-soft); border-color: var(--oxblood); color: var(--oxblood); }
    .quiz-choice:disabled { opacity: 1; cursor: default; }

    .practice-nav { margin-top: 22px; display: flex; justify-content: flex-end; gap: 10px; }
    .btn-practice-nav {
      background: transparent; color: var(--ink-soft);
      border: 1.5px solid var(--line);
      padding: 10px 18px;
    }
    .btn-practice-nav:hover { background: transparent; color: var(--oxblood); border-color: var(--oxblood); }
    .btn-practice-nav:disabled { opacity: .35; }

    .practice-done { text-align: center; padding: 20px 0; }
    .practice-done-title {
      font-family: "Fraunces", serif; font-weight: 600; font-size: 24px;
      margin: 0 0 20px;
    }
    .practice-done .practice-nav { justify-content: center; }

    /* ---- Auth (Supabase magic link) ---- */
    .auth-section { margin-top: 40px; }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 26px 24px;
    }
    .auth-title { font-family: "Fraunces", serif; font-weight: 600; font-size: 22px; margin: 0 0 6px; }
    .auth-lede { color: var(--ink-soft); font-size: 14px; margin: 0 0 20px; }
    .auth-form { display: flex; gap: 10px; }
    .auth-form[hidden] { display: none; }
    .auth-form input {
      flex: 1; min-width: 0;
      font: inherit; font-size: 16px;
      background: var(--paper-2);
      border: 1px solid var(--line); border-radius: var(--radius);
      padding: 12px 14px; color: var(--ink);
    }
    .auth-form input:focus { outline: 2px solid var(--oxblood); outline-offset: 1px; border-color: transparent; }
    .auth-status { margin: 16px 0 0; color: var(--ink-soft); font-size: 14px; }
    .auth-status.error { color: var(--oxblood); }

    .account-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin: 4px 0 18px;
    }
    .account-email { color: var(--ink-soft); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-signout {
      flex: 0 0 auto;
      background: transparent; color: var(--ink-soft);
      border: 1.5px solid var(--line);
      padding: 6px 14px; font-size: 12px;
    }
    .btn-signout:hover { background: transparent; color: var(--oxblood); border-color: var(--oxblood); }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <button id="theme-toggle" type="button" class="btn-theme" aria-label="Theme: System. Tap to change."></button>
      <h1 class="brand">Margin<span class="dot">.</span></h1>
      <p class="tagline">Catch a word from whatever you're reading.</p>
      <button id="install" type="button" class="btn-install" hidden>Install Margin</button>
    </header>

    <!-- Signed-out state: only this shows. Signed-in state: only #app-content shows. -->
    <section id="auth-section" class="auth-section" hidden>
      <div class="auth-card">
        <h2 class="auth-title">Sign in to Margin</h2>
        <p class="auth-lede">We'll email you a link — no password to remember.</p>
        <form id="auth-form" class="auth-form">
          <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" required />
          <button type="submit">Send me a link</button>
        </form>
        <p id="auth-status" class="auth-status" hidden></p>
      </div>
    </section>

    <div id="app-content" hidden>
      <!-- Signed-in account strip. -->
      <div class="account-bar">
        <span id="account-email" class="account-email"></span>
        <button id="sign-out" type="button" class="btn-signout">Sign out</button>
      </div>

      <!-- Book this word came from. Value is remembered between sessions. -->
      <div class="book-row">
        <label for="book">Reading</label>
        <input id="book" type="text" placeholder="e.g. The Name of the Rose" autocomplete="off" />
      </div>

      <!-- The lookup bar -->
      <div class="lookup">
        <div class="word-field">
          <input id="word" type="text" placeholder="type a word…" autocomplete="off"
                 autocapitalize="none" spellcheck="false" enterkeyhint="search" />
          <button id="clear-word" type="button" class="btn-clear" aria-label="Clear" hidden>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <button id="mic" type="button" class="btn-mic" aria-label="Speak a word" title="Speak a word">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
          </svg>
        </button>
        <button id="go">Look up</button>
      </div>

      <!-- One of: idle hint / loading / error / the card -->
      <div id="out">
        <p class="status">Type a word above and press Enter.</p>
      </div>

      <p class="foot">
        Lookups come from a free dictionary. Saved words live on this device only, for now.
      </p>

      <!-- Saved list: loads on open, filterable by book, each entry deletable. -->
      <section class="saved-section">
        <div class="saved-header">
          <h2 class="saved-title">Saved words</h2>
          <div class="saved-header-actions">
            <select id="book-filter" class="book-filter">
              <option value="">All books</option>
            </select>
            <button id="practice-open" type="button" class="btn-practice" hidden>Practice</button>
          </div>
        </div>
        <div id="saved-list"></div>
      </section>

      <!-- Flashcards + quiz, scoped to whatever the book filter above is set to. -->
      <section id="practice-section" class="practice-section" hidden>
        <div id="practice-body"></div>
      </section>
    </div>
  </div>

  <!-- Supabase JS v2, loaded before our own script so `supabase.createClient` is ready. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ---------- tiny helpers ----------
    const $ = (id) => document.getElementById(id);
    const out = $("out");

    // ---------- auth (Supabase magic link) ----------
    // Fill these in from your Supabase project's Settings -> API page.
    // The anon/public key is safe to embed client-side by design — Row Level
    // Security policies on the Supabase side are what actually protect data,
    // not this key.
    const SUPABASE_URL = "https://tnaifyahobaswxgervcy.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuYWlmeWFob2Jhc3d4Z2VydmN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MzYzNTgsImV4cCI6MjEwMDIxMjM1OH0.9UCB6mYL99SK5Cq8EgDYYRT-oMGzedPIsGrLXXTrbbc";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showSignedOut() {
      $("app-content").hidden = true;
      $("auth-section").hidden = false;
    }

    function showSignedIn(session) {
      $("auth-section").hidden = true;
      $("app-content").hidden = false;
      $("account-email").textContent = session.user.email;
    }

    // Reacts to every future change: magic-link completion, sign-out, token
    // refresh. It also fires once immediately with whatever session it finds
    // on load — the explicit getSession() call below is a belt-and-suspenders
    // check for that same initial state, so there's no gap where the wrong
    // screen is showing while that first event is still in flight.
    sb.auth.onAuthStateChange((_event, session) => {
      if (session) showSignedIn(session); else showSignedOut();
    });

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) showSignedIn(session); else showSignedOut();
    });

    $("auth-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = $("auth-email").value.trim();
      if (!email) return;

      const btn = e.target.querySelector("button");
      const status = $("auth-status");
      btn.disabled = true;
      btn.textContent = "Sending…";

      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.origin + window.location.pathname },
      });

      btn.disabled = false;
      btn.textContent = "Send me a link";
      status.hidden = false;
      if (error) {
        status.className = "auth-status error";
        status.textContent = "Something went wrong: " + error.message;
      } else {
        status.className = "auth-status";
        status.textContent = `Check your inbox — we sent a sign-in link to ${email}.`;
      }
    });

    $("sign-out").addEventListener("click", () => sb.auth.signOut());

    // ---------- AI definitions (M4, dormant by default) ----------
    // Flip to true once the LLM proxy is deployed and its API billing is set up.
    // AI_ENDPOINT should point at the deployed Cloudflare Worker (see worker/).
    const AI_ENABLED = false;
    const AI_ENDPOINT = "http://localhost:8787/define";

    // Remember the current book between sessions (simple key/value, not the word list).
    const BOOK_KEY = "margin.book";
    $("book").value = localStorage.getItem(BOOK_KEY) || "";
    $("book").addEventListener("input", (e) => localStorage.setItem(BOOK_KEY, e.target.value));

    // ---------- theme (light / dark / system) ----------
    // "system" means no data-theme attribute — the CSS media query decides.
    // Picking light/dark sets data-theme, which the CSS overrides take priority over.
    const THEME_KEY = "margin.theme";
    const THEME_ORDER = ["system", "light", "dark"];
    const THEME_LABELS = { system: "System", light: "Light", dark: "Dark" };
    const THEME_ICONS = {
      system: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 20h8M12 16v4"/></svg>`,
      light: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`,
      dark: `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6 6 0 0 0 10.5 10.5Z"/></svg>`,
    };

    function applyTheme(theme) {
      if (theme === "system") {
        delete document.documentElement.dataset.theme;
      } else {
        document.documentElement.dataset.theme = theme;
      }
      const btn = $("theme-toggle");
      btn.innerHTML = THEME_ICONS[theme];
      btn.setAttribute("aria-label", `Theme: ${THEME_LABELS[theme]}. Tap to change.`);
      btn.title = `Theme: ${THEME_LABELS[theme]}`;
    }

    let currentTheme = localStorage.getItem(THEME_KEY) || "system";
    applyTheme(currentTheme);

    $("theme-toggle").addEventListener("click", () => {
      currentTheme = THEME_ORDER[(THEME_ORDER.indexOf(currentTheme) + 1) % THEME_ORDER.length];
      localStorage.setItem(THEME_KEY, currentTheme);
      applyTheme(currentTheme);
    });

    // ---------- storage (IndexedDB) ----------
    // The only part of the app allowed to touch IndexedDB. Everything else calls
    // saveEntry / getEntries / deleteEntry and doesn't know or care how they're stored —
    // that's what lets us swap in a cloud database later without touching the UI.
    const DB_NAME = "margin";
    const DB_VERSION = 1;
    const STORE = "entries";

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const store = req.result.createObjectStore(STORE, { keyPath: "id" });
          store.createIndex("book", "book", { unique: false });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    // entry: { word, meaning, partOfSpeech, synonyms, antonyms, example, book, source }
    // One entry per word (case-insensitive). Saving a word already on the list merges
    // into the existing record instead of duplicating it: the book is added to that
    // entry's book list (skipped if it's already there), and the meaning/timestamp refresh.
    async function saveEntry(entry) {
      const db = await openDB();
      const wordKey = entry.word.trim().toLowerCase();
      const book = (entry.book || "").trim();

      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        const store = tx.objectStore(STORE);
        const getAllReq = store.getAll();

        getAllReq.onsuccess = () => {
          const existing = getAllReq.result.find(
            (e) => e.word.trim().toLowerCase() === wordKey
          );
          const savedAt = new Date().toISOString();
          let record;

          if (existing) {
            const books = existing.book ? existing.book.split(",").map((b) => b.trim()).filter(Boolean) : [];
            if (book && !books.includes(book)) books.push(book);
            record = { ...existing, ...entry, book: books.join(", "), savedAt };
          } else {
            record = { ...entry, id: crypto.randomUUID(), savedAt };
          }
          store.put(record);
          tx.oncomplete = () => resolve(record);
        };
        getAllReq.onerror = () => reject(getAllReq.error);
        tx.onerror = () => reject(tx.error);
      });
    }

    // Returns entries newest-first, optionally filtered to one book (a book name
    // is checked for membership in the entry's comma-separated book list).
    async function getEntries({ book } = {}) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const req = db.transaction(STORE, "readonly").objectStore(STORE).getAll();
        req.onsuccess = () => {
          let results = req.result;
          if (book) {
            results = results.filter((e) =>
              (e.book || "").split(",").map((b) => b.trim()).includes(book)
            );
          }
          resolve(results.sort((a, b) => b.savedAt.localeCompare(a.savedAt)));
        };
        req.onerror = () => reject(req.error);
      });
    }

    async function deleteEntry(id) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    // ---------- lookup ----------
    async function lookup(word) {
      word = word.trim().toLowerCase();
      if (!word) return;

      out.innerHTML = `<p class="status">Looking up “${escapeHtml(word)}”…</p>`;
      $("go").disabled = true;

      try {
        const res = await fetch(
          "https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(word)
        );

        if (res.status === 404) {
          out.innerHTML = `<p class="status error">No entry found for “${escapeHtml(word)}”. Check the spelling, or try the base form of the word.</p>`;
          return;
        }
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        render(pickBest(word, data));
      } catch (err) {
        const message = navigator.onLine
          ? "Couldn't reach the dictionary. Check your connection and try again."
          : "You're offline — lookups need an internet connection. Try again once you're back online.";
        out.innerHTML = `<p class="status error">${message}</p>`;
      } finally {
        $("go").disabled = false;
      }
    }

    // Flatten the API's nested response into the fields we care about.
    function pickBest(word, data) {
      const entry = Array.isArray(data) ? data[0] : data;
      // Wiktionary sometimes gives a shortened shared-prefix phonetic ending in "-/"
      // (e.g. "/ɪkˈsæs-/" for "exacerbate") — skip those in favor of a complete one.
      const phoneticCandidates = dedupe([
        entry.phonetic, ...(entry.phonetics || []).map(p => p.text)
      ]);
      const phonetic = phoneticCandidates.find(p => !p.endsWith("-/")) ||
        phoneticCandidates.find(Boolean) || "";
      const audio = (entry.phonetics || []).map(p => p.audio).find(Boolean) || "";

      const meaning = (entry.meanings || [])[0] || {};
      const firstDef = (meaning.definitions || [])[0] || {};

      // Gather synonyms/antonyms from both the meaning level and the definition level.
      const syn = dedupe([...(meaning.synonyms||[]), ...(firstDef.synonyms||[])]).slice(0,6);
      const ant = dedupe([...(meaning.antonyms||[]), ...(firstDef.antonyms||[])]).slice(0,6);

      return {
        word: entry.word || word,
        phonetic,
        audio,
        pos: meaning.partOfSpeech || "",
        definition: firstDef.definition || "No definition text was provided.",
        example: firstDef.example || "",
        synonyms: syn,
        antonyms: ant,
        source: "typed",
      };
    }

    // Asks the LLM proxy for a definition, tagged to the book for context-aware
    // sense selection. Returns the same shape as pickBest() so render() and
    // saveCurrentResult() don't need to know which source produced the result.
    async function lookupAI(word, book) {
      const res = await fetch(AI_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ word, book }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || "AI lookup failed (HTTP " + res.status + ")");
      }
      const data = await res.json();
      return { ...data, phonetic: "", audio: "", source: "ai" };
    }

    // The word currently on screen, so the save button knows what to store.
    let currentResult = null;

    function render(w) {
      currentResult = w;
      const chip = (t, cls="") => `<span class="chip ${cls}">${escapeHtml(t)}</span>`;
      out.innerHTML = `
        <article class="card">
          <div class="headword">${escapeHtml(w.word)}</div>
          <span class="pos">${escapeHtml(w.pos)}</span>${
            w.phonetic ? `<span class="phon">${escapeHtml(w.phonetic)}</span>` : ""
          }${
            w.audio ? `<button type="button" class="btn-audio" data-audio="${escapeHtml(w.audio)}" aria-label="Play pronunciation">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            </button>` : ""
          }${
            w.source === "ai" ? `<span class="ai-badge">AI-generated</span>` : ""
          }
          <p class="def">${escapeHtml(w.definition)}</p>
          ${ w.example ? `<p class="example">“${escapeHtml(w.example)}”</p>` : "" }
          ${ w.synonyms.length ? `<p class="chips-label">Synonyms</p>
             <div class="chips">${w.synonyms.map(s=>chip(s)).join("")}</div>` : "" }
          ${ w.antonyms.length ? `<p class="chips-label">Antonyms</p>
             <div class="chips">${w.antonyms.map(s=>chip(s,"ant")).join("")}</div>` : "" }
          <div class="save-row">
            ${ AI_ENABLED && w.source !== "ai"
              ? `<button id="ai-lookup" class="btn-ai" type="button">Get AI definition</button>`
              : "" }
            <button id="save" class="btn-save" type="button">Save to list</button>
          </div>
        </article>`;
    }

    // Replaces the card with an AI-generated definition for the same word.
    async function getAIDefinition() {
      const btn = $("ai-lookup");
      if (!currentResult || btn.disabled) return;

      btn.disabled = true;
      btn.textContent = "Asking Claude…";
      try {
        const result = await lookupAI(currentResult.word, $("book").value.trim());
        render(result);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Get AI definition";
      }
    }

    // Saves the word currently shown in the card, tagged to the "Reading" field.
    async function saveCurrentResult() {
      const btn = $("save");
      if (!currentResult || btn.disabled) return;

      btn.disabled = true;
      btn.textContent = "Saving…";
      try {
        await saveEntry({
          word: currentResult.word,
          meaning: currentResult.definition,
          partOfSpeech: currentResult.pos,
          synonyms: currentResult.synonyms,
          antonyms: currentResult.antonyms,
          example: currentResult.example,
          book: $("book").value.trim(),
          source: currentResult.source || "typed",
        });
        btn.textContent = "Saved ✓";
        btn.classList.add("saved");
        refreshSavedList();
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Save to list";
      }
    }

    function dedupe(arr){ return [...new Set(arr.filter(Boolean))]; }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

    // ---------- saved list ----------
    let bookFilter = "";

    // Re-reads everything from storage and redraws the filter dropdown + the list.
    async function refreshSavedList() {
      const entries = await getEntries();
      populateBookFilter(entries);
      const shown = bookFilter
        ? entries.filter(e => (e.book || "").split(",").map(b => b.trim()).includes(bookFilter))
        : entries;
      renderSavedList(shown);
    }

    function populateBookFilter(entries) {
      const select = $("book-filter");
      const books = dedupe(
        entries.flatMap(e => (e.book || "").split(",").map(b => b.trim()))
      ).sort();
      select.innerHTML = `<option value="">All books</option>` +
        books.map(b => `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`).join("");
      // Fall back to "All books" if the selected book no longer has any entries.
      bookFilter = books.includes(bookFilter) ? bookFilter : "";
      select.value = bookFilter;
      $("practice-open").hidden = entries.length === 0;
    }

    // Ids of saved entries currently expanded to show their full meaning.
    const expandedIds = new Set();

    function renderSavedList(entries) {
      const list = $("saved-list");
      if (!entries.length) {
        list.innerHTML = `<p class="saved-empty">No saved words yet.</p>`;
        return;
      }
      const chip = (t, cls="") => `<span class="chip ${cls}">${escapeHtml(t)}</span>`;
      list.innerHTML = entries.map(e => {
        const open = expandedIds.has(e.id);
        return `
        <div class="saved-entry">
          <div class="saved-item">
            <button type="button" class="saved-row" data-id="${e.id}" aria-expanded="${open}">
              <span class="saved-word-line">
                <span class="saved-word">${escapeHtml(e.word)}</span>
                <span class="saved-meta">${escapeHtml(e.book || "—")} · ${formatDate(e.savedAt)}</span>
              </span>
              <span class="saved-caret">${open ? "▾" : "▸"}</span>
            </button>
            <button class="saved-delete" type="button" data-id="${e.id}">Delete</button>
          </div>
          ${ open ? `
            <div class="saved-detail">
              ${ e.partOfSpeech ? `<span class="pos">${escapeHtml(e.partOfSpeech)}</span>` : "" }
              <p class="def">${escapeHtml(e.meaning)}</p>
              ${ e.example ? `<p class="example">“${escapeHtml(e.example)}”</p>` : "" }
              ${ (e.synonyms||[]).length ? `<p class="chips-label">Synonyms</p>
                 <div class="chips">${e.synonyms.map(s=>chip(s)).join("")}</div>` : "" }
              ${ (e.antonyms||[]).length ? `<p class="chips-label">Antonyms</p>
                 <div class="chips">${e.antonyms.map(s=>chip(s,"ant")).join("")}</div>` : "" }
            </div>` : "" }
        </div>
      `;
      }).join("");
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    // ---------- practice (flashcards + quiz) ----------
    // Scoped to whatever book the "Saved words" filter is currently set to —
    // there's no separate selector here, it just reuses that choice.
    let practiceMode = null;      // "flashcards" | "quiz"
    let practicePool = [];        // entries matching the current book filter
    let practiceEntries = [];     // shuffled working set for the active session
    let practiceIndex = 0;
    let practiceRevealed = false; // flashcards: is the current card flipped?
    let quizScore = 0;
    let quizChoices = [];         // [{ text, correct }] for the current question
    let quizAnswered = false;
    let quizSelected = -1;

    function shuffled(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Elements hidden while a practice session is open, restored on close.
    function practiceToggleTargets() {
      return [
        document.querySelector(".book-row"),
        document.querySelector(".lookup"),
        out,
        document.querySelector(".foot"),
        document.querySelector(".saved-section"),
      ];
    }

    async function openPractice() {
      practiceToggleTargets().forEach(el => el.hidden = true);
      $("practice-section").hidden = false;
      $("practice-body").innerHTML = ""; // clear any leftover screen from a previous session
      await renderPracticeSetup();
    }

    function closePractice() {
      $("practice-section").hidden = true;
      practiceToggleTargets().forEach(el => el.hidden = false);
      practiceMode = null;
    }

    async function renderPracticeSetup() {
      practicePool = await getEntries(bookFilter ? { book: bookFilter } : undefined);
      const n = practicePool.length;
      $("practice-body").innerHTML = `
        <div class="practice-head">
          <h2 class="saved-title">Practice${bookFilter ? ` — ${escapeHtml(bookFilter)}` : ""}</h2>
          <button id="practice-close" type="button" class="btn-practice-close" aria-label="Close practice">×</button>
        </div>
        <p class="practice-lede">${n} word${n === 1 ? "" : "s"} ${bookFilter ? "in this book" : "saved"}.</p>
        <div class="practice-mode-buttons">
          <button id="start-flashcards" type="button" ${n < 1 ? "disabled" : ""}>Flashcards</button>
          <button id="start-quiz" type="button" ${n < 4 ? "disabled" : ""}>Quiz</button>
        </div>
        ${ n < 4 ? `<p class="practice-hint">Save at least 4 words${bookFilter ? " in this book" : ""} to unlock the quiz.</p>` : "" }
      `;
    }

    function startPractice(mode) {
      practiceMode = mode;
      practiceEntries = shuffled(practicePool);
      practiceIndex = 0;
      practiceRevealed = false;
      quizScore = 0;
      if (mode === "flashcards") renderFlashcard(); else renderQuizQuestion();
    }

    // ---- flashcards ----
    function renderFlashcard() {
      const e = practiceEntries[practiceIndex];
      const chip = (t, cls="") => `<span class="chip ${cls}">${escapeHtml(t)}</span>`;
      $("practice-body").innerHTML = `
        <div class="practice-head">
          <p class="practice-progress">Card ${practiceIndex + 1} of ${practiceEntries.length}</p>
          <button id="practice-close" type="button" class="btn-practice-close" aria-label="Close practice">×</button>
        </div>
        <article class="card flashcard" id="flashcard">
          <div class="headword">${escapeHtml(e.word)}</div>
          ${ e.partOfSpeech ? `<span class="pos">${escapeHtml(e.partOfSpeech)}</span>` : "" }
          ${ practiceRevealed ? `
            <p class="def">${escapeHtml(e.meaning)}</p>
            ${ e.example ? `<p class="example">“${escapeHtml(e.example)}”</p>` : "" }
            ${ (e.synonyms||[]).length ? `<p class="chips-label">Synonyms</p>
               <div class="chips">${e.synonyms.map(s=>chip(s)).join("")}</div>` : "" }
            ${ (e.antonyms||[]).length ? `<p class="chips-label">Antonyms</p>
               <div class="chips">${e.antonyms.map(s=>chip(s,"ant")).join("")}</div>` : "" }
          ` : `<p class="flashcard-hint">Tap the card to reveal the meaning</p>` }
        </article>
        <div class="practice-nav">
          <button id="practice-prev" type="button" class="btn-practice-nav" ${practiceIndex === 0 ? "disabled" : ""}>Prev</button>
          <button id="practice-next" type="button">${practiceIndex === practiceEntries.length - 1 ? "Finish" : "Next"}</button>
        </div>
      `;
    }

    function flipFlashcard() {
      practiceRevealed = !practiceRevealed;
      renderFlashcard();
    }

    function nextFlashcard() {
      if (practiceIndex === practiceEntries.length - 1) { renderPracticeDone(); return; }
      practiceIndex++;
      practiceRevealed = false;
      renderFlashcard();
    }

    function prevFlashcard() {
      if (practiceIndex === 0) return;
      practiceIndex--;
      practiceRevealed = false;
      renderFlashcard();
    }

    // ---- quiz ----
    // Wrong answers are other saved words' real definitions — preferring the
    // same part of speech so they're not trivially guessable, falling back to
    // any other saved word if there aren't enough same-POS ones.
    function pickDistractors(target, pool, count) {
      const others = pool.filter(e => e.id !== target.id);
      const samePos = target.partOfSpeech ? others.filter(e => e.partOfSpeech === target.partOfSpeech) : [];
      const ordered = [...shuffled(samePos), ...shuffled(others)];
      const picks = [];
      const used = new Set([target.meaning]);
      for (const e of ordered) {
        if (picks.length >= count) break;
        if (used.has(e.meaning)) continue;
        used.add(e.meaning);
        picks.push(e.meaning);
      }
      return picks;
    }

    function renderQuizQuestion() {
      const e = practiceEntries[practiceIndex];
      const distractors = pickDistractors(e, practiceEntries, 3);
      quizChoices = shuffled([
        { text: e.meaning, correct: true },
        ...distractors.map(text => ({ text, correct: false })),
      ]);
      quizAnswered = false;
      quizSelected = -1;
      renderQuizBody();
    }

    function renderQuizBody() {
      const e = practiceEntries[practiceIndex];
      $("practice-body").innerHTML = `
        <div class="practice-head">
          <p class="practice-progress">Question ${practiceIndex + 1} of ${practiceEntries.length} · Score ${quizScore}</p>
          <button id="practice-close" type="button" class="btn-practice-close" aria-label="Close practice">×</button>
        </div>
        <article class="card">
          <div class="headword">${escapeHtml(e.word)}</div>
          ${ e.partOfSpeech ? `<span class="pos">${escapeHtml(e.partOfSpeech)}</span>` : "" }
          <p class="quiz-prompt">Which is the correct meaning?</p>
          <div class="quiz-choices">
            ${ quizChoices.map((c, i) => {
              const cls = quizAnswered ? (c.correct ? "correct" : (i === quizSelected ? "incorrect" : "")) : "";
              return `<button type="button" class="quiz-choice ${cls}" data-index="${i}" ${quizAnswered ? "disabled" : ""}>${escapeHtml(c.text)}</button>`;
            }).join("") }
          </div>
          ${ quizAnswered ? `<div class="practice-nav">
            <button id="practice-next" type="button">${practiceIndex === practiceEntries.length - 1 ? "See results" : "Next question"}</button>
          </div>` : "" }
        </article>
      `;
    }

    function answerQuiz(index) {
      if (quizAnswered) return;
      quizAnswered = true;
      quizSelected = index;
      if (quizChoices[index].correct) quizScore++;
      renderQuizBody();
    }

    function nextQuizQuestion() {
      if (practiceIndex === practiceEntries.length - 1) { renderPracticeDone(); return; }
      practiceIndex++;
      renderQuizQuestion();
    }

    // ---- shared end screen ----
    function renderPracticeDone() {
      const isQuiz = practiceMode === "quiz";
      $("practice-body").innerHTML = `
        <div class="practice-head">
          <p class="practice-progress">${isQuiz ? "Quiz" : "Flashcards"} complete</p>
          <button id="practice-close" type="button" class="btn-practice-close" aria-label="Close practice">×</button>
        </div>
        <div class="practice-done">
          <p class="practice-done-title">${
            isQuiz ? `${quizScore} / ${practiceEntries.length} correct` : `You've gone through all ${practiceEntries.length} words.`
          }</p>
          <div class="practice-nav">
            <button id="practice-restart" type="button" class="btn-practice-nav">Back to menu</button>
            <button id="practice-again" type="button">Go again</button>
          </div>
        </div>
      `;
    }

    $("practice-open").addEventListener("click", openPractice);
    $("practice-section").addEventListener("click", (e) => {
      if (e.target.id === "practice-close") { closePractice(); return; }
      if (e.target.id === "start-flashcards") { startPractice("flashcards"); return; }
      if (e.target.id === "start-quiz") { startPractice("quiz"); return; }
      if (e.target.id === "practice-restart") { renderPracticeSetup(); return; }
      if (e.target.id === "practice-again") { startPractice(practiceMode); return; }
      if (e.target.id === "practice-prev") { prevFlashcard(); return; }
      if (e.target.id === "practice-next") {
        if (practiceMode === "flashcards") nextFlashcard(); else nextQuizQuestion();
        return;
      }
      if (e.target.closest("#flashcard")) { flipFlashcard(); return; }
      const choiceBtn = e.target.closest(".quiz-choice");
      if (choiceBtn) answerQuiz(Number(choiceBtn.dataset.index));
    });

    // ---------- voice input ----------
    // Fills the word field only — it never triggers the lookup itself. You review
    // (and fix, if it misheard) before pressing Look up or Enter, same as typing.
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      const mic = $("mic");
      let listening = false;

      const stopListening = () => {
        listening = false;
        mic.classList.remove("listening");
        mic.setAttribute("aria-label", "Speak a word");
      };

      recognition.addEventListener("result", (e) => {
        // Chrome tacks sentence punctuation onto single-word results (e.g. "incessant.") — strip it.
        $("word").value = e.results[0][0].transcript.trim().replace(/[.,!?;:]+$/, "");
        $("word").focus();
        updateClearButton();
      });
      recognition.addEventListener("end", stopListening);
      recognition.addEventListener("error", stopListening);

      mic.addEventListener("click", () => {
        if (listening) { recognition.stop(); return; }
        listening = true;
        mic.classList.add("listening");
        mic.setAttribute("aria-label", "Listening… tap to stop");
        recognition.start();
      });
    } else {
      // Not supported in this browser (e.g. Firefox) — typing still works fine.
      $("mic").remove();
    }

    // ---------- clear button ----------
    // Shows only once there's text to clear; voice input also triggers it (see above).
    function updateClearButton() {
      $("clear-word").hidden = !$("word").value;
    }
    updateClearButton();

    // ---------- events ----------
    $("go").addEventListener("click", () => lookup($("word").value));
    $("word").addEventListener("input", updateClearButton);
    $("word").addEventListener("keydown", (e) => { if (e.key === "Enter") lookup($("word").value); });
    $("clear-word").addEventListener("click", () => {
      $("word").value = "";
      updateClearButton();
      $("word").focus();
    });
    out.addEventListener("click", (e) => {
      if (e.target.id === "save") saveCurrentResult();
      if (e.target.id === "ai-lookup") getAIDefinition();
      const audioBtn = e.target.closest(".btn-audio");
      if (audioBtn) new Audio(audioBtn.dataset.audio).play();
    });

    $("book-filter").addEventListener("change", (e) => {
      bookFilter = e.target.value;
      refreshSavedList();
    });

    $("saved-list").addEventListener("click", async (e) => {
      const del = e.target.closest(".saved-delete");
      if (del) {
        expandedIds.delete(del.dataset.id);
        await deleteEntry(del.dataset.id);
        refreshSavedList();
        return;
      }
      const row = e.target.closest(".saved-row");
      if (row) {
        const id = row.dataset.id;
        expandedIds.has(id) ? expandedIds.delete(id) : expandedIds.add(id);
        renderSavedList(await getEntries(bookFilter ? { book: bookFilter } : undefined));
      }
    });

    refreshSavedList();

    // ---------- register the service worker (needed for install + offline shell) ----------
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }

    // ---------- install prompt ----------
    // Chrome/Edge fire this instead of showing their own install UI immediately;
    // we hold onto it and surface our own button so install isn't hidden in a menu.
    let deferredInstallPrompt = null;
    const installBtn = $("install");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      installBtn.hidden = false;
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredInstallPrompt) return;
      installBtn.hidden = true;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
    });

    window.addEventListener("appinstalled", () => {
      installBtn.hidden = true;
      deferredInstallPrompt = null;
    });
  </script>
</body>
</html>
